apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hello-deployment
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/DillSecOps/labs.git
    targetRevision: main
    path: labs/apps/hello-deployment
  destination:
    server: https://kubernetes.default.svc
    namespace: learn
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

